spring.application.name=backend
server.port=8080

# Database Configuration (H2 In-Memory Database)
spring.datasource.url=jdbc:h2:mem:chatbot_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration (available at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# OpenAI Property Shell
openai.api.key=${OPENAI_API_KEY:your-key-here}
