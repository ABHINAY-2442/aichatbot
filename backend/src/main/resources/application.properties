spring.application.name=backend
server.port=8080

# Database Configuration (MySQL)
# Update username and password as necessary for the local MySQL instance
spring.datasource.url=jdbc:mysql://localhost:3306/chatbot_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# OpenAI Property Shell
openai.api.key=${OPENAI_API_KEY:your-key-here}
